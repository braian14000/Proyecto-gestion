<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Organizador</title>
    <link rel="icon" href="icono.png" type="pestaña.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="unirse.css">
</head>
<body>

<div class="container">

    <div class="hero">
        <img src="LogoUTN_Gestion_De_Eventos.png" alt="Logo UTN" class="logo">
    </div>

    <div class="login-box">

        <h2>Iniciar Sesión</h2>

        <input type="email" id="correo" placeholder="Correo electrónico Organizador">

        <input type="password" id="password" placeholder="Contraseña">

        <button onclick="login()">Ingresar</button>

        <a href="#">¿Olvidaste tu contraseña?</a>

    </div>

</div>

</body>
</html>
