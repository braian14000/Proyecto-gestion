{% extends 'base.html' %}

{% block title %}Mi QR{% endblock %}

{% block body %}
  <div class="container mt-5 text-center">
    <h4>Mi Código QR</h4>
    <div class="card d-inline-block p-4 mt-3">
      <img src="{{ qr_path }}" alt="QR" style="max-width:300px;">
    </div>
    <div class="mt-3">
      <a class="btn btn-secondary" href="{{ back_url }}">Volver atrás</a>
    </div>
  </div>
{% endblock %}
