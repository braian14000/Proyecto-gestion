{% extends './base.html' %}

{% block title %}Registro{% endblock %}

{% block customCSS %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
{% endblock %}

{% block body %}
<main class="form-signin w-100 m-auto" style="max-width: 330px; padding: 15px; margin-top: 100px !important;">
    <form action="/register" method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>

        <h1 class="h3 mb-3 fw-normal">Crear una cuenta</h1>
        
        <div class="form-floating mb-2">
            <input type="text" class="form-control" id="fullname" name="fullname" placeholder="Nombre Completo" required>
            <label for="fullname">Nombre Completo</label>
        </div>

        <div class="form-floating mb-2">
            <input type="text" class="form-control" id="username" name="username" placeholder="Username" required>
            <label for="username">Usuario</label>
        </div>
        
        <div class="form-floating mb-3">
            <input type="password" class="form-control" id="password" name="password" placeholder="Password" required>
            <label for="password">Contraseña</label>
        </div>
        
        <button class="w-100 btn btn-lg btn-success mb-2" type="submit">Registrarse</button>
        <a href="{{ url_for('login') }}" class="d-block text-center mt-2">¿Ya tienes cuenta? Inicia sesión</a>
    </form>
</main>
{% endblock %}
